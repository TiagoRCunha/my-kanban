spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:my_kanban}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.sql.init.mode=always
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration-minutes=120
app.seed.admin.enabled=${APP_SEED_ADMIN_ENABLED:true}
app.seed.admin.full-name=${APP_SEED_ADMIN_FULL_NAME:Tiago Admin}
app.seed.admin.email=${APP_SEED_ADMIN_EMAIL}
app.seed.admin.password=${APP_SEED_ADMIN_PASSWORD}
